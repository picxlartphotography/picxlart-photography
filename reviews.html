<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    /* Global Base Styling */
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins', sans-serif;
    }

    body{
        background:#0d0d0d;
        color:#f5f5f5;
        margin:0;
        padding-top:90px;
        overflow-x:hidden;
        -webkit-user-select:none;
        -moz-user-select:none;
        -ms-user-select:none;
        user-select:none;
    }

    /* Top Navbar Layout & Styling */
    .navbar{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        background:rgba(10,10,10,0.92);
        backdrop-filter:blur(12px);
        -webkit-backdrop-filter:blur(12px);
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:8px 40px;
        z-index:99999;
        border-bottom:2px solid #d4af37;
        box-shadow:0 4px 25px rgba(0,0,0,.5);
        overflow:hidden;
    }

    .nav-logo img{
        height:60px;
        width:auto;
        transition: transform 0.3s ease;
    }
    
    .nav-logo img:hover {
        transform: scale(1.03);
    }
        
    .nav-menu{
        display:flex;
        gap:35px;
    }

    .nav-menu a{
        color:#e0e0e0;
        text-decoration:none;
        font-weight:500;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 13px;
        transition: all 0.3s ease;
        position: relative;
        padding: 4px 0;
    }

    .nav-menu a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1.5px;
        background: #d4af37;
        transition: width 0.3s ease;
    }

    .nav-menu a:hover::after {
        width: 100%;
    }

    .nav-menu a:hover{
        color:#d4af37;
        text-shadow:0 0 10px rgba(212,175,55,.3);
    }

    .nav-social{
        display:flex;
        gap:20px;
    }

    .nav-social a{
        color:#e0e0e0;
        text-decoration:none;
        font-size:18px;
        transition:all .3s ease;
    }

    .nav-social a:hover{
        color:#d4af37;
        transform:translateY(-3px);
    }

    /* Mobile Menu Toggle Button */
    .menu-toggle {
        display: none;
        color: #d4af37;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        z-index: 1000000;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    /* Page Content Styling */
    h1{
        text-align:center;
        color:#d4af37;
        margin: 40px 0;
        font-size: 36px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .review-gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
        gap:20px;
        max-width:1400px;
        margin:0 auto 60px;
        padding: 0 20px;
    }

    .review-gallery img{
        width:100%;
        border-radius:15px;
        display:block;
        transition: 0.4s;
    }
    
    .review-gallery img:hover {
        transform: scale(1.02);
    }

    /* Enterprise Footer Architecture */
    footer {
        text-align: center;
        padding: 50px 20px;
        background: #080808;
        color: #777777;
        font-size: 13px;
        border-top: 1px solid #1a1a1a;
    }

    .footer-links-container {
        margin-bottom:25px; 
        line-height: 2.2;
    }

    .footer-links-container a {
        color:#d4af37; 
        text-decoration:none;
        font-weight: 500;
        transition: color 0.3s ease;
    }
    
    .footer-links-container a:hover {
        color: #ffffff;
    }

    .footer-divider {
        color:#333;
        margin: 0 8px;
    }

    /* Mobile View Overrides */
    @media(max-width:768px){
        .navbar{
            padding:12px 24px;
            flex-wrap: nowrap;
            overflow: visible !important;
        }

        .nav-logo img{
            height:45px;
        }

        .menu-toggle {
            display: block; 
        }

        .nav-social {
            display: none !important; 
        }

        .nav-menu {
            position: fixed;
            top: 60px; 
            left: 0;
            width: 100%;
            height: auto; 
            background: rgba(13, 13, 13, 0.97);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 0;
            padding: 15px 0 0 0;
            transform: translateY(-150%); 
            transition: transform 0.4s ease-in-out;
            z-index: 999998;
            border-bottom: 3px solid #d4af37; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .nav-menu.active {
            transform: translateY(0);
        }

        .nav-menu a {
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 500;
            color: #d4af37 !important;
            width: 100%;
            text-align: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .nav-menu a:last-child {
            border-bottom: none;
            padding-bottom: 22px;
        }

        .nav-menu a::after {
            display: none; 
        }
    }
</style>
</head>

<script>
// Mobile Dropdown Control Script
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const navMenu = document.querySelector('.nav-menu');

mobileMenuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    navMenu.classList.toggle('active');
    if(navMenu.classList.contains('active')) {
        mobileMenuBtn.textContent = '✕';
    } else {
        mobileMenuBtn.textContent = '☰';
    }
});

const navLinks = document.querySelectorAll('.nav-menu a');
navLinks.forEach(link => {
    link.addEventListener('click', () => {
        navMenu.classList.remove('active');
        mobileMenuBtn.textContent = '☰';
    });
});

// Security Controls
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
document.addEventListener('dragstart', function(e){ e.preventDefault(); });
document.addEventListener('keydown', function(e){
    if(e.ctrlKey && (e.key === 's' || e.key === 'u' || e.key === 'c')){ e.preventDefault(); }
    if(e.key === 'F12'){ e.preventDefault(); }
});
</script>
