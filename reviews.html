<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Reviews | Picxlart Photography & Events Co.</title>

<style>
body{
    background:#111;
    color:white;
    font-family:'Poppins',sans-serif;
    margin:0;
    padding:40px 20px;
}

h1{
    text-align:center;
    color:#d4af37;
    margin-bottom:40px;
}

.review-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    max-width:1400px;
    margin:auto;
}

.review-card{
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    border:1px solid #333;
}

.review-card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.review-content{
    padding:20px;
}

.review-name{
    color:#d4af37;
    font-size:18px;
    margin-bottom:10px;
}

.review-text{
    line-height:1.7;
    color:#ddd;
}
</style>
</head>
