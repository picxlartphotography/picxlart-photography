<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picxlart Photography & Events Co.</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Logo */
.logo{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
}

.logo img{
    height:80px;
    width:auto;
}

/* Hero Section */
.hero {
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    text-align: center;
    padding-bottom: 180px; 
}

/* Slideshow chobi gulor jonno layout */
.hero-slideshow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* Dark layer jate chobir opor lekha bhalo bojha jay */
.hero-slideshow::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6));
    z-index: 2;
}

.mySlides {
    display: none;
    width: 100%;
    height: 100%;
}

.mySlides img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Hero content jate chobir opor thake */
.hero-content {
    position: relative;
    z-index: 3;
}

.hero-content p{
    font-size:22px;
    margin-bottom:25px;
}

.btn{
    background:#d4af37;
    color:black;
    padding:12px 30px;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    display: inline-block;
    border: none;
    cursor: pointer;
}

/* Sections */
section{
    padding:70px 10%;
}

h2{
    text-align:center;
    margin-bottom:40px;
    color:#d4af37;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1c1c1c;
    padding:30px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
    min-height:140px;
}
    
.card h3{
    color:#d4af37;
}
.card:hover{
    transform:translateY(-5px);
}

/* ================= BOOKING FORM STYLING ================= */
.booking-section {
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('Cover.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    text-align: center;
    padding: 60px 5%;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
}

.booking-section h2 {
    margin-bottom: 10px;
}

.booking-section .sub-text {
    color: #ccc;
    font-size: 15px;
    margin-bottom: 30px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.5;
}

.form-inline {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    max-width: 1000px;
    margin: 0 auto;
}

.form-inline select, 
.form-inline input {
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: 1px solid #444;
    padding: 15px 20px;
    font-size: 15px;
    border-radius: 30px;
    outline: none;
    min-width: 200px;
    flex: 1;
}

.form-inline select option {
    background: #111;
    color: white;
}

.form-inline input[type="date"] {
    color-scheme: dark;
}

.form-inline select:focus, 
.form-inline input:focus {
    border-color: #d4af37;
}

.form-inline .send-btn {
    background: white;
    color: black;
    padding: 15px 40px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.form-inline .send-btn:hover {
    background: #d4af37;
    color: black;
}

/* ================= CONTACT & STATS STYLING ================= */

/* Counter Statistics Boxes */
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 60px;
}

.stat-box {
    background: #1c1c1c;
    border: 1px solid #333;
    padding: 30px 15px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.stat-box:hover {
    border-color: #d4af37;
    transform: translateY(-5px);
}

.stat-box h3 {
    font-size: 36px;
    color: #d4af37;
    margin-bottom: 5px;
    font-weight: bold;
}

.stat-box p {
    font-size: 13px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
}
