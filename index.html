<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Logo */
.logo{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
}

.logo img{
    height:80px;
    width:auto;
}

/* Hero Section */
.hero {
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    text-align: center;
    padding-bottom: 180px; 
}

/* Slideshow chobi gulor jonno layout */
.hero-slideshow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* Dark layer jate chobir opor lekha bhalo bojha jay */
.hero-slideshow::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6));
    z-index: 2;
}

.mySlides {
    display: none;
    width: 100%;
    height: 100%;
}

.mySlides img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Hero content jate chobir opor thake */
.hero-content {
    position: relative;
    z-index: 3;
}

.hero-content p{
    font-size:22px;
    margin-bottom:25px;
}

.btn{
    background:#d4af37;
    color:black;
    padding:12px 30px;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    display: inline-block;
    border: none;
    cursor: pointer;
}

/* Sections */
section{
    padding:70px 10%;
}

h2{
    text-align:center;
    margin-bottom:40px;
    color:#d4af37;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1c1c1c;
    padding:30px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
    min-height:140px;
}
    
.card h3{
    color:#d4af37;
}
.card:hover{
    transform:translateY(-5px);
}

/* ================= BOOKING FORM STYLING (WITH BG IMAGE & OVERLAY) ================= */
.booking-section {
    position: relative;
    background-image: url('Cover.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    text-align: center;
    padding: 80px 5%;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
    z-index: 1;
}

/* Transparent Dark Cover Overlay for Form Background */
.booking-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75); /* Transparent black layer */
    z-index: -1;
}

.booking-section h2 {
    margin-bottom: 10px;
    position: relative;
}

.booking-section .sub-text {
    color: #ccc;
    font-size: 15px;
    margin-bottom: 30px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.5;
    position: relative;
}

.form-inline {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    max-width: 1000px;
    margin: 0 auto;
    position: relative;
}
